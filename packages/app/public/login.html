<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login</title>
  <link rel="stylesheet" href="styles/styles.css" />
  <link rel="stylesheet" href="styles/auth.css" />
</head>
<body>

  <h2>User Login</h2>

  <form id="login-form">
    <label>
      Username:
      <input type="text" id="username" name="username" autocomplete="off" required />
    </label>
    <label>
      Password:
      <input type="password" id="password" name="password" autocomplete="new-password" required />
    </label>
    <button type="submit">Login</button>
  </form>

  <p>
    Or <a href="signup.html">sign up as a new user</a>.
  </p>

  <script>
    (function() {
      const form     = document.getElementById('login-form');
      const userIn   = document.getElementById('username');
      const passIn   = document.getElementById('password');
      const params   = new URLSearchParams(window.location.search);
      const redirect = params.get('redirect') || '/';

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = userIn.value.trim();
        const password = passIn.value;
        if (!username || !password) return alert('Fill both fields');

        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });

          if (!res.ok) {
            const errText = await res.text();
            return alert('Login failed: ' + errText);
          }

          const json = await res.json();

          console.log("Login successful, received info:", json);

          // 1) Save token + username locally:
          localStorage.setItem('token', json.token);
          localStorage.setItem('username', username);

          const { token } = json;
          console.log("Using token:", token)
          const customEvent = new CustomEvent(
          'auth:message', { 
          bubbles: true,
          composed: true,
          detail: [
              'auth/signin',
              { token, redirect: redirect }
          ]
          });
          console.log("dispatching message", customEvent);
          this.dispatchEvent(customEvent);

          // 2) NO Events.relay(...) HERE!  Instead just redirect to the SPA:
          window.location.href = redirect;

        } catch (err) {
          console.error(err);
          alert('Network error');
        }
      });
    })();
  </script>

</body>
</html>
