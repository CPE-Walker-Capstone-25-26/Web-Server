<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create an Account</title>
  <link rel="stylesheet" href="styles/styles.css" />
  <link rel="stylesheet" href="styles/auth.css" />
</head>
<body>

  <!-- page heading -->
  <h2>Create an Account</h2>

  <!-- signup form -->
  <form id="signup-form">
    <!-- username field -->
    <label>
      Username:
      <input
        type="text"
        id="username"
        name="username"
        autocomplete="username"
        required
      />
    </label>

    <!-- password field -->
    <label>
      Password:
      <input
        type="password"
        id="password"
        name="password"
        autocomplete="new-password"
        required
      />
    </label>

    <!-- submit button -->
    <button type="submit">Sign Up</button>

    <!-- hidden error message container -->
    <p class="error" id="error-msg" hidden></p>
  </form>

  <!-- link to login page for existing users -->
  <p>
    Already have an account?
    <a href="login.html">Log in instead</a>.
  </p>

  <script>
    (function() {
      // grab form elements
      const form     = document.getElementById('signup-form');
      const userIn   = document.getElementById('username');
      const passIn   = document.getElementById('password');
      const errMsg   = document.getElementById('error-msg');

      // check for redirect param, default to track_progress.html
      const params   = new URLSearchParams(window.location.search);
      const redirect = params.get('redirect') || 'login.html';

      // form submission handler
      form.addEventListener('submit', async (e) => {
        e.preventDefault();            // prevent page reload
        errMsg.hidden = true; // hide any old error

        // simple client-side validation
        const username = userIn.value.trim();
        const password = passIn.value;
        if (!username || !password) {
          errMsg.textContent = 'Please fill both fields';
          errMsg.hidden = false;
          return;
        }

        try {
          // send signup request
          const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });

          if (!res.ok) {
            // show server error message
            const body = await res.json().catch(() => null);
            errMsg.textContent = body?.error || 'Registration failed';
            errMsg.hidden = false;
            return;
          }

          // on success, store JWT and redirect
          const { token } = await res.json();
          localStorage.setItem('token', token);
          window.location.href = redirect;

        } catch (err) {
          // network or unexpected error
          console.error(err);
          errMsg.textContent = 'Network error';
          errMsg.hidden = false;
        }
      });
    })();
  </script>

</body>
</html>
